# This workflow will upload a Python Package to PyPI when a release is created
  # For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

  # This workflow uses actions that are not certified by GitHub.
  # They are provided by a third-party and are governed by
  # separate terms of service, privacy policy, and support
  # documentation.

  name: Upload Python Package

  on:
    release:
      types: [published]

  permissions:
    contents: read

  # Avoid concurrent publish runs for the same release.
  concurrency:
    group: publish-${{ github.event.release.tag_name }}
    cancel-in-progress: false

  jobs:
    release-build:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: "3.x"
            cache: "pip"

        - name: Build release distributions
          run: |
            python -m pip install --upgrade pip
            python -m pip install build
            python -m build

        - name: Check distributions with twine
          run: |
            python -m pip install twine
            python -m twine check dist/*

        - name: Upload distributions
          uses: actions/upload-artifact@v4
          with:
            name: release-dists
            path: dist/
            if-no-files-found: error

    pypi-publish:
      runs-on: ubuntu-latest
      needs:
        - release-build
      permissions:
        # IMPORTANT: this permission is mandatory for trusted publishing
        id-token: write

      # Dedicated environments with protections for publishing are strongly recommended.
      # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
      environment:
        name: pypi
        url: https://pypi.org/p/qqn-jax

      steps:
        - name: Retrieve release distributions
          uses: actions/download-artifact@v4
          with:
            name: release-dists
            path: dist/

        - name: Publish release distributions to PyPI
          # Trusted publishing (OIDC) is used via the id-token permission above;
          # no username/password or API token is required.
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            packages-dir: dist/
            print-hash: true